# Portable Hermes workflow baseline. Secrets and OAuth state never belong here.
# Pick the live provider with `hermes model` or scripts/workflow/switch_model.py.
model:
  default: gpt-5.6-sol
  provider: openai-codex
  base_url: ''
  api_key: ''

fallback_providers: []
toolsets:
  - hermes-cli
max_live_sessions: 16

agent:
  max_turns: 150
  gateway_timeout: 1800
  reasoning_effort: medium

terminal:
  backend: local
  cwd: .
  timeout: 180

# Context7 adds current public library documentation. Other MCPs are opt-in:
# sequential-thinking duplicates model reasoning; public-apis duplicates web discovery.
mcp_servers:
  context7:
    command: hermes-npx
    args:
      - -y
      - '@upstash/context7-mcp@3.2.2'
    timeout: 120
    connect_timeout: 120

display:
  interface: cli
  language: zh
  skin: default

# Lowest-risk portable defaults. Media, Spotify, X and meeting plugins are opt-in.
plugins:
  enabled:
    - security-guidance
    - web/ddgs
  disabled: []

platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - vision
    - web
