# Portable Hermes workflow baseline. Secrets and OAuth state never belong here.
# Pick the live provider with `hermes model` or scripts/workflow/switch_model.py.
model:
  default: gpt-5.6-sol
  provider: openai-codex
  base_url: ''
  api_key: ''
  # Bound runaway answers without changing the active provider/model selection.
  max_tokens: 8192

# Curated display lanes do not remove models from Hermes' provider registry.
# Sync preserves the active provider/model and credentials on existing machines.
model_picker:
  custom_lanes:
    enabled: true
    lanes:
      - label: KIMI 系列
        provider: kimi-coding
        models:
          - kimi-k3
          - kimi-k2.7-code-highspeed
          - kimi-k2.7-code
          - kimi-k2.6
          - kimi-k2.5
      - label: DEEPSEEK 系列
        provider: deepseek
        models:
          - deepseek-v4-pro
          - deepseek-v4-flash
          - deepseek-chat
          - deepseek-reasoner
      - label: CHATGPT 系列
        provider: openai-codex
        models:
          - gpt-5.6-sol
          - gpt-5.6-terra
          - gpt-5.6-luna
          - gpt-5.5
          - gpt-5.3-codex-spark

fallback_providers: []
toolsets:
  - hermes-cli
max_live_sessions: 16

agent:
  max_turns: 150
  gateway_timeout: 1800
  reasoning_effort: low

terminal:
  backend: local
  cwd: .
  timeout: 180

# Context7 adds current public library documentation. Other MCPs are opt-in:
# sequential-thinking duplicates model reasoning; public-apis duplicates web discovery.
mcp_servers:
  context7:
    command: hermes-npx
    args:
      - -y
      - '@upstash/context7-mcp@3.2.2'
    env:
      HERMES_NPX_ALLOW_PATH_FALLBACK: '1'
    timeout: 120
    connect_timeout: 120

display:
  interface: cli
  language: zh
  skin: default
  streaming: true
  # Busy input queues the next message instead of interrupting the active turn.
  # Use explicit /interrupt when cancellation is intended.
  busy_input_mode: queue

# Aliases use Hermes' /model handler; they never auto-switch the current session.
quick_commands:
  切换kimi:
    type: alias
    target: /model kimi-k3 --provider kimi-coding
    description: 切换到 KIMI K3
  切换kimi稳:
    type: alias
    target: /model kimi-k3 --provider kimi-coding
    description: 切换到 KIMI K3 旗舰模型
  切换kimi快:
    type: alias
    target: /model kimi-k2.7-code --provider kimi-coding
    description: 切换到 KIMI 快速模型 kimi-k2.7-code
  切换kimi极速:
    type: alias
    target: /model kimi-k2.7-code-highspeed --provider kimi-coding
    description: 切换到 KIMI 官方高速模型 kimi-k2.7-code-highspeed
  切换dp:
    type: alias
    target: /model deepseek-v4-flash --provider deepseek
    description: 切换到 DEEPSEEK V4 Flash
  切换gpt:
    type: alias
    target: /model gpt-5.6-sol --provider openai-codex
    description: 切换到 CHATGPT 5.6 Sol
  切换gpt快:
    type: alias
    target: /model gpt-5.3-codex-spark --provider openai-codex
    description: 切换到 CHATGPT Codex Spark 快速模型

# Lowest-risk portable defaults. Media, Spotify, X and meeting plugins are opt-in.
plugins:
  enabled:
    - security-guidance
    - web/ddgs
  disabled: []

platform_toolsets:
  cli:
    - browser
    - clarify
    - code_execution
    - computer_use
    - cronjob
    - delegation
    - file
    - image_gen
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - vision
    - web
