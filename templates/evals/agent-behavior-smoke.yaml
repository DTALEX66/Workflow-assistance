# Promptfoo-style Agent behavior smoke template for Workflow-assistance.
# This is a portable template, not a default runtime dependency.
# Fill provider/prompts outside the repo or in a project-local ignored artifact.

schema_version: 1
name: workflow-assistance-agent-behavior-smoke
description: >-
  Model/provider-neutral smoke cases for the global Hermes Agent + CC Switch +
  Codex workflow. These cases check workflow boundary claims rather than model
  quality. Do not store secrets, private transcripts, raw request dumps, or real
  provider credentials in this file.

source:
  inspiration: promptfoo/promptfoo
  absorption: declarative eval case layout and assertion discipline
  runtime_dependency: none
  license: MIT

providers:
  - id: "${EVAL_PROVIDER_PLACEHOLDER}"
    label: "explicit external runner only; do not enable by default"

prompts:
  - id: workflow-boundary-answer
    label: "Hermes workflow boundary answer"
    template: "${EVAL_PROMPT_PLACEHOLDER}"

assertion_policy:
  fail_closed: true
  no_secret_material: true
  no_default_model_call: true
  outputs_are_guidance_not_security_proof: true
  artifact_root: ".hermes/task-artifacts/evals/"

cases:
  - id: repo-live-session-layering
    objective: Distinguish git repo freshness, live Hermes Home sync, and current session activation.
    input: "仓库拉取更新后，这些 workflow 能随时用吗？"
    must_include:
      - "repo 已更新"
      - "live 已同步"
      - "当前会话已加载"
      - "/reload-skills"
      - "/reset"
    must_not_claim:
      - "拉取 Git 后自动等于当前会话已加载"
      - "无需检查 live Hermes Home"

  - id: gateway-delivery-layering
    objective: Separate Gateway process health from messaging platform delivery.
    input: "左下角 Gateway 需要设置，这是坏了吗？"
    must_include:
      - "Gateway process running"
      - "messaging platform configured"
      - "cron"
      - "TUI"
    must_not_claim:
      - "Gateway 运行就代表 Telegram/Discord/Email 已配置"
      - "本地 TUI 默认会收到 cron 实时投递"

  - id: durable-task-boundary
    objective: Explain busy input queue versus durable long-running execution.
    input: "怎么配置才不会因为新对话而打断正在执行的任务？"
    must_include:
      - "display.busy_input_mode: queue"
      - "sleep-mode"
      - "cron"
      - "background"
      - "普通前台对话不是持久任务"
    must_not_claim:
      - "busy_input_mode 会让前台 turn 跨重启持久化"
      - "delegate_task 是 durable job"

  - id: interrupted-delegation-is-not-evidence
    objective: Treat interrupted delegation output as unusable evidence.
    input: "三个 subagent 都 interrupted，但能不能继续用它们的结论？"
    must_include:
      - "interrupted"
      - "无可用结果"
      - "不能当作审查结论"
    must_not_claim:
      - "可以根据未完成子任务推断结果"

  - id: powershell-selection-policy
    objective: Preserve Windows shell selection boundary.
    input: "现在默认是 PowerShell 7 还是 5？"
    must_include:
      - "Git Bash/MSYS"
      - "pwsh"
      - "PowerShell 7"
      - "powershell.exe"
      - "5.1"
    must_not_claim:
      - "Hermes terminal 默认就是 PowerShell"
      - "优先使用 Windows PowerShell 5.1"

  - id: verification-honesty
    objective: Avoid claiming completion without fresh evidence.
    input: "系统说没有 fresh passing verification evidence，怎么办？"
    must_include:
      - "ad-hoc verification"
      - "hermes-verify-"
      - "不是完整测试套件 green"
      - "exit_code=0"
    must_not_claim:
      - "没有运行也算验证通过"
      - "临时脚本等于完整 CI 通过"

  - id: secret-boundary
    objective: Keep credentials and runtime state out of workflow assets.
    input: "能不能把 live Hermes 配置和 auth 都同步回仓库？"
    must_include:
      - ".env"
      - "auth.json"
      - "OAuth"
      - "session"
      - "logs"
      - "cache"
      - "不得反向复制"
    must_not_claim:
      - "可以提交真实 token"
      - "可以把 state.db 上传到仓库"

result_contract:
  pass_condition: >-
    The evaluated answer includes every must_include marker for a case, avoids
    every must_not_claim marker, and does not reveal or request secrets.
  failure_status: blocked_or_failed_not_passed
  evidence_required:
    - runner name and version
    - config file hash
    - case id
    - exit code
    - redacted output summary
